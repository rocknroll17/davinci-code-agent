<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DaVinci Training Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --orange: #d29922;
      --purple: #bc8cff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }
    header h1 { font-size: 18px; font-weight: 600; }
    #status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.4s;
    }
    #status-dot.live { background: var(--green); }
    #status-dot.done { background: var(--orange); }
    #status-label { color: var(--muted); font-size: 12px; }

    .kpi-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
    }
    .kpi {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 18px;
      min-width: 148px;
    }
    .kpi .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .kpi .value { font-size: 22px; font-weight: 700; margin-top: 4px; color: var(--accent); }
    .kpi .value.good { color: var(--green); }
    .kpi .value.bad  { color: var(--red); }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: 16px;
      padding: 16px 24px;
    }
    .chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .chart-card h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }
    canvas { max-height: 240px; }

    .log-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin: 0 24px 24px;
      padding: 16px;
    }
    .log-card h3 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
    #log-list {
      list-style: none;
      max-height: 220px;
      overflow-y: auto;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 12px;
    }
    #log-list li { padding: 2px 0; color: var(--muted); }
    #log-list li span.ts { color: var(--accent); margin-right: 8px; }
  </style>
</head>
<body>

<header>
  <div id="status-dot"></div>
  <h1>DaVinci Training Dashboard</h1>
  <span id="status-label">Connecting…</span>
</header>

<div class="kpi-bar">
  <div class="kpi"><div class="label">Update</div><div class="value" id="kpi-update">—</div></div>
  <div class="kpi"><div class="label">Timesteps</div><div class="value" id="kpi-steps">—</div></div>
  <div class="kpi"><div class="label">Mean Reward</div><div class="value" id="kpi-reward">—</div></div>
  <div class="kpi"><div class="label">Policy Loss</div><div class="value" id="kpi-ploss">—</div></div>
  <div class="kpi"><div class="label">Value Loss</div><div class="value" id="kpi-vloss">—</div></div>
  <div class="kpi"><div class="label">Belief Loss</div><div class="value" id="kpi-bloss">—</div></div>
  <div class="kpi"><div class="label">Entropy</div><div class="value" id="kpi-entropy">—</div></div>
  <div class="kpi"><div class="label">Learning Rate</div><div class="value" id="kpi-lr">—</div></div>
  <div class="kpi"><div class="label">Win Rate P0</div><div class="value" id="kpi-wr0">—</div></div>
  <div class="kpi"><div class="label">Win Rate P1</div><div class="value" id="kpi-wr1">—</div></div>
</div>

<div class="charts-grid">
  <div class="chart-card"><h3>Mean Reward</h3><canvas id="chart-reward"></canvas></div>
  <div class="chart-card"><h3>Losses</h3><canvas id="chart-losses"></canvas></div>
  <div class="chart-card"><h3>Entropy</h3><canvas id="chart-entropy"></canvas></div>
  <div class="chart-card"><h3>Learning Rate</h3><canvas id="chart-lr"></canvas></div>
  <div class="chart-card"><h3>Episode Length</h3><canvas id="chart-eplen"></canvas></div>
  <div class="chart-card"><h3>Win Rate (eval)</h3><canvas id="chart-winrate"></canvas></div>
</div>

<div class="log-card">
  <h3>Event Log</h3>
  <ul id="log-list"></ul>
</div>

<script src="/static/dashboard.js"></script>
</body>
</html>
