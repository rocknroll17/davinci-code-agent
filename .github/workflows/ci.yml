name: CI

# Byte-compiles the package and runs a one-step PPO training smoke test on CPU.
# No checkpoint or GPU needed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: pip

      - name: Install dependencies (CPU PyTorch)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Byte-compile
        run: python -m compileall -q src main.py eval.py play.py

      - name: Training smoke (1 PPO update)
        run: python scripts/ci_smoke.py
