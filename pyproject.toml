[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
filterwarnings = [
    # benign torch note: TransformerEncoder nested-tensor + norm_first=True
    "ignore:enable_nested_tensor is True:UserWarning",
]

[tool.ruff]
line-length = 120
target-version = "py310"
exclude = [".venv", "experiments", "logs", "checkpoints"]

[tool.ruff.lint]
# High-signal, low-churn rule set: real bugs (pyflakes F), import order (I),
# and syntax/critical pycodestyle (E9). Avoids mass cosmetic churn on a
# pre-existing codebase while still catching unused imports/undefined names.
select = ["F", "I", "E9"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
warn_unused_ignores = false
check_untyped_defs = false
# Don't report errors in imported legacy modules — this is a partially-typed
# research codebase. CI runs mypy only on the new, cleanly-typed library modules
# (interfaces, reward_config, episode, runner); follow_imports=silent keeps the
# numpy/torch typing noise in trainer.py/eval_suite.py from leaking in.
follow_imports = "silent"
